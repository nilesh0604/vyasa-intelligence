apiVersion: apps/v1
kind: Deployment
metadata:
  name: vyasa-api
  namespace: vyasa
  labels:
    app: vyasa-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: vyasa-api
  template:
    metadata:
      labels:
        app: vyasa-api
    spec:
      containers:
      - name: api
        image: vyasa-intelligence:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8000
        envFrom:
        - configMapRef:
            name: vyasa-config
        - secretRef:
            name: vyasa-secrets
        resources:
          requests:
            cpu: "500m"
            memory: "1Gi"
          limits:
            cpu: "2"
            memory: "4Gi"
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 5
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        volumeMounts:
        - name: data-volume
          mountPath: /data
      volumes:
      - name: data-volume
        emptyDir: {}
