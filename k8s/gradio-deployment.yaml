apiVersion: apps/v1
kind: Deployment
metadata:
  name: vyasa-gradio
  namespace: vyasa
  labels:
    app: vyasa-gradio
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vyasa-gradio
  template:
    metadata:
      labels:
        app: vyasa-gradio
    spec:
      containers:
      - name: gradio
        image: vyasa-gradio:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 7860
        env:
        - name: API_BASE_URL
          value: "http://vyasa-api-service"
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        readinessProbe:
          httpGet:
            path: /
            port: 7860
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: vyasa-gradio-service
  namespace: vyasa
  labels:
    app: vyasa-gradio
spec:
  selector:
    app: vyasa-gradio
  ports:
  - port: 7860
    targetPort: 7860
    protocol: TCP
  type: ClusterIP
