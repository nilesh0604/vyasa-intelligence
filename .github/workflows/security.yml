name: Security Scan

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # Run security scan daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  # Python Security Scanning
  python-security:
    name: Python Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Install dependencies
        run: |
          uv sync --dev

      - name: Run Bandit security linter
        run: |
          uv run bandit -r src/ -f json -o bandit-report.json || true
          uv run bandit -r src/ -f txt -o bandit-report.txt

      - name: Run Safety check for known vulnerabilities
        run: |
          uv run safety check --json --output safety-report.json || true
          uv run safety check --output safety-report.txt

      - name: Run pip-audit
        run: |
          pip install pip-audit
          uv run pip-audit --format=json --output=pip-audit-report.json || true
          uv run pip-audit --output=pip-audit-report.txt

      - name: Upload security reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: python-security-reports
          path: |
            bandit-report.*
            safety-report.*
            pip-audit-report.*
          retention-days: 30

  # Container Security Scanning
  container-security:
    name: Container Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: vyasa-intelligence:scan
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'vyasa-intelligence:scan'
          format: 'sarif'
          output: 'trivy-results.sarif'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Run Grype vulnerability scanner
        run: |
          # Install Grype
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin
          # Run scan
          grype vyasa-intelligence:scan -o json -f > grype-results.json || true
          grype vyasa-intelligence:scan -o table > grype-results.txt || true

      - name: Upload container security reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: container-security-reports
          path: |
            trivy-results.sarif
            grype-results.*
          retention-days: 30

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  # CodeQL Analysis
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: [python]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-extended,security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{matrix.language}}"

  # Secrets Detection
  secrets-scan:
    name: Secrets Detection
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
        with:
          report-format: sarif
          output-file: gitleaks-results.sarif

      - name: Upload Gitleaks results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'gitleaks-results.sarif'

  # Dependency Security Analysis
  dependency-security:
    name: Dependency Security Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Run pip-audit
        run: |
          pip install pip-audit
          uv run pip-audit --requirement <(uv pip compile pyproject.toml) --format=json --output=dependency-audit.json || true
          uv run pip-audit --requirement <(uv pip compile pyproject.toml) --output=dependency-audit.txt || true

      - name: Run Snyk to check for vulnerabilities
        continue-on-error: true
        uses: snyk/actions/python@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --sarif-file-output=snyk-results.sarif

      - name: Upload Snyk results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'snyk-results.sarif'

      - name: Upload dependency security reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dependency-security-reports
          path: |
            dependency-audit.*
            snyk-results.sarif
          retention-days: 30

  # Security Scorecard
  security-scorecard:
    name: OSSF Scorecard
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      id-token: write
      actions: read
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@v2.3.1
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload SARIF to GitHub
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif

  # Security Summary
  security-summary:
    name: Security Summary
    runs-on: ubuntu-latest
    needs: [python-security, container-security, codeql, secrets-scan, dependency-security]
    if: always()
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: security-reports

      - name: Create security summary
        run: |
          echo "# Security Scan Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Scan Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Python Security
          if [ "${{ needs.python-security.result }}" == "success" ]; then
            echo "✅ **Python Security Scan**: Passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Python Security Scan**: Failed" >> $GITHUB_STEP_SUMMARY
          fi
          
          # Container Security
          if [ "${{ needs.container-security.result }}" == "success" ]; then
            echo "✅ **Container Security Scan**: Passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Container Security Scan**: Failed" >> $GITHUB_STEP_SUMMARY
          fi
          
          # CodeQL
          if [ "${{ needs.codeql.result }}" == "success" ]; then
            echo "✅ **CodeQL Analysis**: Passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **CodeQL Analysis**: Failed" >> $GITHUB_STEP_SUMMARY
          fi
          
          # Secrets Scan
          if [ "${{ needs.secrets-scan.result }}" == "success" ]; then
            echo "✅ **Secrets Detection**: Passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Secrets Detection**: Failed" >> $GITHUB_STEP_SUMMARY
          fi
          
          # Dependency Security
          if [ "${{ needs.dependency-security.result }}" == "success" ]; then
            echo "✅ **Dependency Security**: Passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Dependency Security**: Failed" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📊 Detailed reports are available in the artifacts section." >> $GITHUB_STEP_SUMMARY
